name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - run: bun run typecheck

  build-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - run: bun run build
      - name: Verify build artifacts are up to date
        run: git diff --exit-code data/classifier-trie.json data/flag-rules-compiled.json data/write-emitters.json hooks/pretooluse.js hooks/posttooluse.js

  bundle-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - run: bun run build
      - name: Execute bundled hook from foreign cwd
        run: |
          cd /tmp
          echo '{"tool_name":"Bash","tool_input":{"command":"ls"}}' | node "$GITHUB_WORKSPACE/hooks/pretooluse.js"
          echo '{"tool_name":"Read","tool_input":{"file_path":"/tmp/x"}}' | node "$GITHUB_WORKSPACE/hooks/pretooluse.js"

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - run: bun install
      - name: Verify extraction
        run: bun run verify:extract
      - run: bun test
      - name: Z3 wall-time gate
        if: matrix.os == 'ubuntu-latest'
        run: bun run scripts/measure-z3.ts
