output:
  - failure
  - execution_info

pre-push:
  commands:
    beads:
      run: |
        if command -v bd >/dev/null 2>&1; then
          BD_GIT_HOOK=1 bd hooks run pre-push "$@" || true
        fi

post-commit:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
    build:
      run: bun run build
