output:
  - failure
  - execution_info

pre-commit:
  piped: true
  commands:
    build:
      run: bun run build && git add data/classifier-trie.json data/flag-rules-compiled.json data/write-emitters.json hooks/pretooluse.js hooks/posttooluse.js
    typecheck:
      run: bun run typecheck
    verify-extract:
      run: bun run verify:extract
    test:
      run: bun test

pre-push:
  commands:
    z3-proofs:
      run: bun test --grep z3
