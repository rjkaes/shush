output:
  - failure
  - execution_info

pre-commit:
  piped: true
  commands:
    build:
      run: bun run build && git add data/classifier-trie.json hooks/pretooluse.js
    typecheck:
      run: bun run typecheck
    test:
      run: bun test

pre-push:
  commands:
    z3-proofs:
      run: bun test --grep z3
