output:
  - failure
  - execution_info

pre-commit:
  commands:
    build-trie:
      glob: "data/classify_full/*.json"
      run: bun run scripts/build-trie.ts && git add data/classifier-trie.json

post-commit:
  parallel: false
  commands:
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
    build:
      run: bun run build
