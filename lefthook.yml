output:
  - failure
  - execution_info

pre-commit:
  commands:
    generate-classifiers:
      glob: "data/classify_full/*.json"
      run: bun run scripts/build-trie.ts && git add data/classifier-trie.json
    build:
      run: bun run build && git add hooks/pretooluse.js
    typecheck:
      run: bun run typecheck
    test:
      run: bun test
